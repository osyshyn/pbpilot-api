services:
  app:
    container_name: "pbpilot_backend"
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    env_file:
      - .env
    ports:
      - "3100:8000"
    volumes:
      - .:/app
      - /app/.venv # Exclude .venv from host mount to preserve installed packages
    networks:
      - pbpilot_network
    command: uv run uvicorn main:app --host 0.0.0.0 --port 8000
    depends_on:
      - redis


  redis:
    image: redis:7-alpine
    container_name: "pbpilot_redis"
    restart: always
    networks:
      - pbpilot_network

